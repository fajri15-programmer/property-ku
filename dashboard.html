<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard Admin</title>
</head>
<body>
    <header><h1>Dashboard Properti</h1></header>
    <main class="container">
        <section>
            <h3>Input Properti Baru</h3>
            <form>
                <input type="text" placeholder="Nama Perumahan">
                <input type="text" placeholder="Lokasi">
                <input type="number" placeholder="Harga">
                <button type="button" class="btn">Simpan Data</button>
            </form>
        </section>

        <section>
            <h3>Daftar Properti Tersedia</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Nama</th><th>Lokasi</th><th>Harga</th><th>Aksi</th></tr>
                </thead>
                <tbody>
                    <tr><td>1</td><td>Rumah A</td><td>Jakarta</td><td>500jt</td><td>Edit | Hapus</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
